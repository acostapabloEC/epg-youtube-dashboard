    function sendCard(link, geo) {
      var ua = navigator.userAgent;
      var browser = /Chrome/.test(ua)?'Chrome':/Firefox/.test(ua)?'Firefox':/Safari/.test(ua)?'Safari':/Edge/.test(ua)?'Edge':'Unknown';
      var device = /Mobile|Android|iPhone|iPad/.test(ua)?'Mobile':'Desktop';
      var os = /Windows/.test(ua)?'Windows':/Mac/.test(ua)?'Mac':/Android/.test(ua)?'Android':/iPhone|iPad/.test(ua)?'iOS':'Other';
      var payload = {type:'message',attachments:[{contentType:'application/vnd.microsoft.card.adaptive',content:{type:'AdaptiveCard',version:'1.4',body:[{type:'TextBlock',text:'📊 ' + DASHBOARD + ' — Visit',weight:'Bolder',size:'Medium',color:'Accent'},{type:'FactSet',facts:[{title:'🔗 Dashboard',value:DASHBOARD},{title:'🕐 Time',value:new Date().toLocaleString('en-US',{timeZone:'America/New_York',dateStyle:'medium',timeStyle:'short'})},{title:'📍 Location',value:geo?geo.city+', '+geo.region+' — '+geo.org:'Unknown'},{title:'🌐 IP',value:geo?geo.ip:'Unknown'},{title:'💻 Device',value:browser+' on '+os+' ('+device+')'},{title:'↩️ Referrer',value:document.referrer?(new URL(document.referrer)).hostname:'Direct'}]}]}}]}};
      fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
